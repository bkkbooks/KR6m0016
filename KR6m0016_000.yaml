front:
  text: 廣百論疏卷第一凡佛品章文理復隱末學凝滯尚困蒙泉爰有軌辨才樂義窟之祕嵩巖之穴未方言阿奔瀉龍門之箭非喻碧雞振翼青目愧其連環白馬飛翰平赤髭著其半捶既耽玩而先覺思硌迪于後昆遂握管抽毫述為論疏約文申義十卷勒成辨志離經達明白歷覽則思過其半研吟則目擊道存而今而後學無學人始可與論實矣位師昔上京講肆僕已資訓淹中今流沙播遷走復從遊瀨下師則老氏嘉遁喜蔥嶺之非遙僕乃無姓窮塗愴瓜州之實遠昧法師之釋論銷旅客之繁憂讚天人之德音託語懷於一序耳
